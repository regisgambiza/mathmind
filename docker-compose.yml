services:
  db:
    image: postgres:15-alpine
    container_name: mathmind-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mathmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./server-python
      dockerfile: Dockerfile
    container_name: mathmind-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/mathmind
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-mathmind-secret-key}
      - BACKEND_URL=http://localhost:5000
      - FRONTEND_URL=http://localhost:5173
      - CORS_ORIGINS=http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      - db

volumes:
  postgres_data:
