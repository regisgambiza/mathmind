services:
  # Backend: Python Flask
  - type: web
    name: mathmind-backend
    env: docker
    dockerContext: server-python
    dockerfilePath: server-python/Dockerfile
    plan: free # Can be changed to paid for performance
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mathmind-db
          property: connectionString
      - key: PORT
        value: 5000
      - key: CORS_ORIGINS
        value: "*" # Update with your Firebase/Render frontend URL later
      - key: GOOGLE_CLIENT_ID
        sync: false # Set in Render Dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: BACKEND_URL
        value: https://mathmind-backend.onrender.com
      - key: FRONTEND_URL
        value: https://mathmind-frontend.onrender.com

  # Frontend: React/Vite (Static Site)
  - type: web
    name: mathmind-frontend
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: mathmind-backend
          property: host

databases:
  - name: mathmind-db
    plan: free
