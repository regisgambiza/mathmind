services:
  # Backend: Python Flask
  - type: web
    name: mathmind-backend
    env: docker
    dockerContext: server-python
    dockerfilePath: Dockerfile
    plan: free # Can be changed to paid for performance
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mathmind-db
          property: connectionString
      - key: PORT
        value: 5000
      - key: CORS_ORIGINS
        value: "*" # Update with your Firebase/Render frontend URL later
      - key: GOOGLE_CLIENT_ID
        sync: false # Set in Render Dashboard
      - key: SECRET_KEY
        generateValue: true

  # Frontend: React/Vite (Static Site)
  - type: static
    name: mathmind-frontend
    env: node
    rootDirectory: client
    buildCommand: npm install && npm run build
    publishPath: dist
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: mathmind-backend
          property: host

databases:
  - name: mathmind-db
    plan: free
